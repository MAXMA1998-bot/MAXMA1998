<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>✨ 𝓜𝓐𝓧 𝓑𝓞𝓞𝓣 ✨</title>
    <style>
        body { background: #050505; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .box { text-align: center; padding: 30px; border: 1px solid #333; border-radius: 15px; background: #111; }
        .btn { display: inline-block; background: #ffcc00; color: #000; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>✨ 𝓜𝓐𝓧 𝓑𝓞𝓞𝓣 ✨</h1>
        <p>جاري تحويلك للمشغل المباشر..</p>
        <p style="font-size: 12px; color: #888;">سيتم فتح المشغل المترجم تلقائياً</p>
        <a id="watchBtn" class="btn" href="#">مشاهدة الفيلم الآن</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const imdb_id = params.get('id');
        
        // الرابط المترجم
        const finalUrl = `https://embed.su/embed/movie/${imdb_id}?sub=ar`;
        
        // ربط الزر للفتح في نافذة جديدة
        const btn = document.getElementById('watchBtn');
        btn.href = finalUrl;
        btn.target = "_blank"; // هذا هو السر: يفتح في نافذة جديدة
        
        // تحويل تلقائي للفتح في نافذة جديدة
        setTimeout(() => { 
            window.open(finalUrl, '_blank'); 
        }, 1500);
    </script>
